# Server
server.port=8080

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/stylebook_db
spring.datasource.username=stylebook_user
spring.datasource.password=stylebook_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
stylebook.jwt.secret=stylebookSecretKey2026GhanaBeautyBarberBookingAppWestAfrica123456
stylebook.jwt.expiration=86400000

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
stylebook.upload.dir=uploads/

# Mail (update with real credentials for production)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your@gmail.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
stylebook.app.name=StyleBook
stylebook.app.base-url=http://10.192.1.15:8080